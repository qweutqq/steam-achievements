<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Achievement Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000000;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .global-bg {
            position: fixed;
            top: -20px;
            left: -20px;
            width: calc(100% + 40px);
            height: calc(100vh + 40px);
            z-index: 1;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            opacity: 0.45;
        }
        .content-wrapper {
            position: relative;
            z-index: 2;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        .main-header { text-align: center; margin: 25px 0 15px; }
        .main-title { display: inline-flex; align-items: center; gap: 10px; color: #58a6ff; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { background-color: rgba(33, 38, 45, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(48, 54, 61, 0.5); color: #8b949e; padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: all 0.2s; }
        .filter-btn.active { background-color: #1f6feb; border-color: #58a6ff; color: #ffffff; box-shadow: 0 0 10px rgba(31, 111, 235, 0.4); }
        .games-list { display: flex; flex-direction: column; gap: 4px; }
        .game-row { border-bottom: 1px solid rgba(48, 54, 61, 0.3); padding: 12px 6px; display: flex; align-items: center; gap: 14px; }
        .game-clickable { display: flex; align-items: center; gap: 14px; flex-grow: 1; cursor: pointer; }
        .game-avatar { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; }
        .game-info { display: flex; align-items: center; justify-content: space-between; flex-grow: 1; padding-right: 10px; }
        .game-name { font-size: 15px; font-weight: 600; color: #f0f6fc; }
        .like-btn { background: none; border: none; color: #484f58; cursor: pointer; font-size: 18px; padding: 8px; }
        .like-btn.liked { color: #f43f5e; }
        .back-btn { background-color: rgba(33, 38, 45, 0.4); color: #58a6ff; border: 1px solid rgba(48, 54, 61, 0.6); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .game-header-inside { text-align: center; margin-bottom: 25px; }
        .game-title-text { color: #f0f6fc; font-size: 24px; font-weight: 700; }
        .progress-container { background-color: rgba(22, 27, 34, 0.4); border: 1px solid rgba(48, 54, 61, 0.5); border-radius: 8px; padding: 12px; margin-bottom: 18px; }
        .progress-text { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .progress-bar-bg { background-color: rgba(33, 38, 45, 0.7); border-radius: 4px; height: 6px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #58a6ff, #1f6feb); height: 100%; width: 0%; transition: width 0.4s; }
        .achievements-list { display: flex; flex-direction: column; gap: 6px; }
        .achievement-item { background-color: rgba(22, 27, 34, 0.35); border: 1px solid rgba(48, 54, 61, 0.3); border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .achievement-icon { width: 40px; height: 40px; border-radius: 6px; }
        .icon-locked { filter: grayscale(100%) opacity(35%); }
        .achievement-info { display: flex; flex-direction: column; flex-grow: 1; }
        .achievement-name { font-size: 13px; font-weight: 700; color: #f0f6fc; }
        .achievement-desc { font-size: 11px; color: #8b949e; }
        .status-badge { font-size: 10px; padding: 4px 7px; border-radius: 6px; font-weight: 700; }
        .status-unlocked { background-color: rgba(56, 139, 253, 0.1); color: #58a6ff; }
        .status-locked { background-color: rgba(240, 246, 252, 0.02); color: #8b949e; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="global-dynamic-bg" class="global-bg"></div>

    <div id="games-view">
        <div class="content-wrapper">
            <header class="main-header">
                <div class="main-title"><i class="fa-brands fa-steam"></i> Steam</div>
            </header>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
                <button class="filter-btn" onclick="setFilter('tracked', this)"><i class="fa-solid fa-heart" style="color: #f43f5e;"></i> Отслеживаемые</button>
                <button class="filter-btn" onclick="setFilter('premium', this)">Платные</button>
                <button class="filter-btn" onclick="setFilter('free', this)">Бесплатные</button>
            </div>
            <div class="games-list" id="games-container">Загрузка библиотеки...</div>
        </div>
    </div>

    <div id="achievements-view" class="hidden">
        <div class="content-wrapper">
            <button class="back-btn" onclick="showGamesView()"><i class="fa-solid fa-arrow-left"></i> Назад</button>
            <header class="game-header-inside"><div id="selected-game-title" class="game-title-text"></div></header>
            <div class="progress-container">
                <div class="progress-text"><span id="progress-stats"></span><span id="progress-percent"></span></div>
                <div class="progress-bar-bg"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
            </div>
            <div class="achievements-list" id="achievements-container"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://steam-achievements-backend.onrender.com';
        const DEFAULT_BG = "https://images.unsplash.com/photo-1612287230202-1bf1d85d1bdf?q=80&w=1000&auto=format&fit=crop";

        let allGamesRaw = [];
        let currentFilter = 'all';
        let likedGames = JSON.parse(localStorage.getItem('steam_liked_games')) || [];

        document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${DEFAULT_BG}')`;

        // Массив ключевых слов для быстрого определения бесплатных игр (F2P)
        const f2pKeywords = ['dota', 'counter-strike', 'cs:go', 'apex', 'pubg', 'warframe', 'team fortress', 'war thunder', 'world of tanks', 'lost ark', 'unturned', 'brawlhalla', 'destiny 2', 'naraka', 'crossout', 'enlisted', 'paladins', 'smite', 'path of exile'];

        async function loadGames() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/games`);
                const data = await response.json();

                // Маркируем игры на фронтенде мгновенно
                allGamesRaw = (data.games || []).map(game => {
                    const nameLower = game.name.toLowerCase();
                    const isFree = f2pKeywords.some(keyword => nameLower.includes(keyword));
                    return { ...game, is_free: isFree };
                });

                renderGamesList();
            } catch (error) {
                document.getElementById('games-container').innerHTML = '<p style="color:red; text-align:center;">Ошибка загрузки данных.</p>';
            }
        }

        function renderGamesList() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            let filtered = allGamesRaw.filter(game => {
                const isLiked = likedGames.includes(game.appid);
                if (currentFilter === 'tracked') return isLiked;
                if (currentFilter === 'free') return game.is_free;
                if (currentFilter === 'premium') return !game.is_free;
                return true;
            });

            filtered.sort((a, b) => {
                const aLiked = likedGames.includes(a.appid) ? 1 : 0;
                const bLiked = likedGames.includes(b.appid) ? 1 : 0;
                if (aLiked !== bLiked) return bLiked - aLiked;
                return a.name.localeCompare(b.name);
            });

            if(filtered.length === 0) {
                container.innerHTML = '<p style="color:#8b949e; text-align:center;">Тут пока пусто</p>';
                return;
            }

            filtered.forEach(game => {
                const row = document.createElement('div');
                row.className = 'game-row';
                const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;
                const isLiked = likedGames.includes(game.appid);

                row.innerHTML = `
                    <div class="game-clickable" onclick="loadAchievements(${game.appid}, '${game.name.replace(/'/g, "\\'")}')">
                        <img class="game-avatar" src="${imgUrl}" onerror="this.src='${DEFAULT_BG}'">
                        <div class="game-info"><div class="game-name">${game.name}</div></div>
                    </div>
                    <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${game.appid}, event)">
                        <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGamesList();
        }

        function toggleLike(id, e) {
            e.stopPropagation();
            const idx = likedGames.indexOf(id);
            if(idx === -1) likedGames.push(id); else likedGames.splice(idx, 1);
            localStorage.setItem('steam_liked_games', JSON.stringify(likedGames));
            renderGamesList();
        }

        async function loadAchievements(gameId, gameName) {
            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.remove('hidden');
            document.getElementById('selected-game-title').innerText = gameName;

            const container = document.getElementById('achievements-container');
            container.innerHTML = 'Загрузка ачивок...';

            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();
                container.innerHTML = '';

                const achs = data.achievements || [];
                if(achs.length === 0) {
                    container.innerHTML = '<p style="color:#8b949e; text-align:center;">У этой игры нет достижений или они скрыты.</p>';
                    return;
                }

                const unlocked = achs.filter(a => a.achieved === 1).length;
                const percent = Math.round((unlocked / achs.length) * 100);

                document.getElementById('progress-stats').innerText = `Выполнено: ${unlocked} из ${achs.length}`;
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar-fill').style.width = `${percent}%`;

                achs.sort((a,b) => b.achieved - a.achieved).forEach(ach => {
                    const item = document.createElement('div');
                    item.className = 'achievement-item';
                    const isUn = ach.achieved === 1;

                    item.innerHTML = `
                        <img class="achievement-icon ${isUn ? '' : 'icon-locked'}" src="${ach.icon_url || DEFAULT_BG}">
                        <div class="achievement-info">
                            <div class="achievement-name">${ach.name}</div>
                            <div class="achievement-desc">${ach.description || 'Секретное достижение'}</div>
                        </div>
                        <span class="status-badge ${isUn ? 'status-unlocked' : 'status-locked'}">${isUn ? 'Открыто' : 'Закрыто'}</span>
                    `;
                    container.appendChild(item);
                });
            } catch(e) { container.innerHTML = 'Ошибка загрузки ачивок.'; }
        }

        function showGamesView() {
            document.getElementById('achievements-view').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');
        }

        loadGames();
    </script>
</body>
</html>
