<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Achievement Tracker</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ (ТЕМНАЯ ТЕМА) */
        body {
            background-color: #000000;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* КОНТЕНТ (ОБЕРТКА ДЛЯ ОТСТУПОВ) */
        .content-wrapper {
            padding: 15px;
            position: relative;
            z-index: 2; /* Всегда поверх фона */
        }

        /* ШРИФТЫ ДЛЯ ЭМОДЗИ (ДЛЯ ПОДДЕРЖКИ АЙФОНОВСКИХ) */
        @font-face {
            font-family: 'AppleColorEmoji';
            src: local('Apple Color Emoji'), url('https://raw.githubusercontent.com/twa-icons/apple-emoji/main/apple-emoji.ttf') format('truetype');
            font-display: swap;
        }
        .apple-emoji {
            font-family: 'AppleColorEmoji', sans-serif !important;
            vertical-align: middle;
            font-size: 1.1em;
            line-height: 1;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        .main-header {
            text-align: center;
            margin: 20px 0 25px;
            position: relative;
        }
        .main-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #58a6ff;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .main-title img {
            width: 22px;
            height: 22px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        .game-row {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s, transform 0.1s;
        }
        .game-row:hover {
            background-color: #1f242c;
            border-color: #58a6ff;
        }
        .game-row:active {
            transform: scale(0.98);
        }
        .game-avatar {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #21262d;
            flex-shrink: 0;
        }
        .game-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }
        .game-name {
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
        }
        .perfect-badge {
            display: flex;
            align-items: center;
            font-size: 11px;
            background-color: rgba(212, 175, 55, 0.12);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 3px 6px;
            border-radius: 10px;
            font-weight: 700;
        }
        .perfect-badge img {
            width: 14px;
            height: 14px;
            margin-right: 3px;
        }

        /* --- ЭКРАН АЧИВОК С ПЛАВАЮЩИМ ФОНОМ --- */
        #achievements-view {
            position: relative;
            min-height: 100vh;
        }

        /* КОМПОНЕНТ ФОНА (КАРТИНКА ИГРЫ + ЗАТЕМНЕНИЕ + ГРАДИЕНТ) */
        .game-background-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55vh; /* Фиксированная высота для градиента */
            z-index: 1; /* Под контентом */
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            opacity: 0.8; /* Небольшая прозрачность */
        }
        /* ЗАТЕМНЕНИЕ */
        .game-background-fixed::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Сильное затемнение картинки */
        }
        /* ПЛАВНЫЙ ГРАДИЕНТ В ЧЕРНЫЙ ВНИЗУ */
        .game-background-fixed::after {
            content: "";
            position: absolute;
            bottom: -2px; /* Чуть ниже, чтобы скрыть стык */
            left: 0;
            width: 100%;
            height: 50%; /* Градиент занимает половину картинки */
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%);
        }

        /* Кнопка "Назад" поверх фона */
        .back-btn {
            background-color: rgba(33, 38, 45, 0.6);
            backdrop-filter: blur(5px);
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
            position: relative;
            z-index: 3;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover {
            background-color: rgba(48, 54, 61, 0.7);
        }

        /* Заголовок игры на фоне */
        .game-header-on-bg {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 3;
            padding-top: 10vh; /* Смещение вниз от кнопки назад */
        }
        .game-title-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #f0f6fc;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Тень для читаемости */
            margin: 0 auto;
            max-width: 90%;
        }
        .perfect-title-emoji {
            width: 20px;
            height: 20px;
        }

        /* КОНТЕЙНЕР АЧИВОК (НАЧИНАЕТСЯ ТАМ, ГДЕ ЗАКАНЧИВАЕТСЯ ГРАДИЕНТ) */
        .achievements-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 3;
            background-color: #000000; /* Переход в чистый черный */
            padding-top: 5px; /* Маленький отступ от градиента */
        }

        /* ПРОГРЕСС-БАР */
        .progress-container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #f0f6fc;
        }
        .progress-bar-bg {
            background-color: #21262d;
            border-radius: 4px;
            height: 7px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            height: 100%;
            width: 0%;
            transition: width 0.35s ease-out;
        }
        /* Золотой прогресс-бар */
        .progress-container.perfect-game .progress-bar-fill {
            background: linear-gradient(90deg, #ffd700, #d4af37) !important;
        }
        .progress-container.perfect-game {
            border-color: rgba(212, 175, 55, 0.4) !important;
            background-color: rgba(212, 175, 55, 0.03) !important;
        }

        /* СПИСОК АЧИВОК */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .achievement-item {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 9px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .achievement-icon {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            object-fit: cover;
            background-color: #21262d;
            border: 1px solid #30363d;
            flex-shrink: 0;
        }
        .icon-locked {
            filter: grayscale(100%) opacity(40%);
        }
        .achievement-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex-grow: 1;
        }
        .achievement-name {
            font-size: 13px;
            font-weight: 700;
            color: #f0f6fc;
        }
        .achievement-desc {
            font-size: 11px;
            color: #8b949e;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 3px 5px;
            border-radius: 6px;
            font-weight: 700;
            white-space: nowrap;
        }
        .status-badge img {
            width: 11px;
            height: 11px;
        }
        .status-unlocked {
            background-color: rgba(56, 139, 253, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.25);
        }
        .status-locked {
            background-color: rgba(240, 246, 252, 0.02);
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="games-view">
        <div class="content-wrapper">
            <header class="main-header">
                <div class="main-title">
                    <img src="https://raw.githubusercontent.com/twa-icons/apple-emoji/main/img/steam.png" alt="steam-logo" class="apple-emoji">
                    Steam
                </div>
            </header>
            <div class="games-list" id="games-container">Загрузка списка игр...</div>
        </div>
    </div>

    <div id="achievements-view" class="hidden">
        <div id="game-bg-image" class="game-background-fixed"></div>

        <div class="content-wrapper">
            <button class="back-btn" onclick="showGamesView()">⬅ К списку игр</button>

            <header class="game-header-on-bg">
                <div id="selected-game-title" class="game-title-text">Ачивки</div>
            </header>

            <div class="achievements-container">
                <div id="progress-block" class="progress-container">
                    <div class="progress-text">
                        <span id="progress-stats">Выполнено: 0 из 0</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    </div>
                </div>

                <div class="achievements-list" id="achievements-container">Загрузка достижений...</div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://steam-achievements-backend.onrender.com';

        // URL-адреса для айфоновских эмодзи (CDN)
        const EMOJI_CROWN = "https://raw.githubusercontent.com/twa-icons/apple-emoji/main/img/crown.png";
        const EMOJI_TROPHY = "https://raw.githubusercontent.com/twa-icons/apple-emoji/main/img/trophy.png";
        const EMOJI_LOCK = "https://raw.githubusercontent.com/twa-icons/apple-emoji/main/img/lock.png";

        async function loadGames() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/games`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                const container = document.getElementById('games-container');
                container.innerHTML = '';

                for (const game of data.games) {
                    const row = document.createElement('div');
                    row.className = 'game-row';
                    row.id = `game-row-${game.appid}`;
                    row.onclick = () => loadAchievements(game.appid, game.name);

                    // Для аватарок используем header.jpg, он стабилен
                    const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;

                    row.innerHTML = `
                        <img class="game-avatar" src="${imgUrl}" alt="${game.name}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=38&h=38&auto=format&fit=crop'">
                        <div class="game-info">
                            <div class="game-name">${game.name}</div>
                            <div class="perfect-badge hidden" id="badge-${game.appid}"><img src="${EMOJI_TROPHY}" alt="trophy" class="apple-emoji"> 100%</div>
                        </div>
                    `;
                    container.appendChild(row);

                    // Фоном проверяем статус
                    checkGamePerfectStatus(game.appid);
                }
            } catch (error) {
                console.error("Ошибка загрузки игр:", error);
                document.getElementById('games-container').innerHTML = '<p style="color:red; text-align:center; font-size:14px; margin-top:20px;">Не удалось загрузить библиотеку</p>';
            }
        }

        async function checkGamePerfectStatus(gameId) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();
                if (data.achievements && data.achievements.length > 0) {
                    const total = data.achievements.length;
                    const unlocked = data.achievements.filter(ach => ach.achieved === 1).length;

                    if (total === unlocked && total > 0) {
                        const badge = document.getElementById(`badge-${gameId}`);
                        if (badge) badge.classList.remove('hidden');
                    }
                }
            } catch(e) { console.error("Ошибка проверки:", gameId, e); }
        }

        async function loadAchievements(gameId, gameName) {
            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.remove('hidden');

            // Устанавливаем заголовок без корон (короны добавим ниже, если нужно)
            const titleElement = document.getElementById('selected-game-title');
            titleElement.innerText = gameName;

            // Устанавливаем затемненный фон (картинку игры)
            const bgElement = document.getElementById('game-bg-image');
            const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${gameId}/header.jpg`;
            bgElement.style.backgroundImage = `url('${imgUrl}')`;

            const container = document.getElementById('achievements-container');
            container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:10px;">Загрузка достижений...</p>';

            const progressBlock = document.getElementById('progress-block');
            progressBlock.classList.remove('perfect-game');
            document.getElementById('progress-bar-fill').style.width = '0%';
            document.getElementById('progress-stats').innerText = 'Выполнено: 0 из 0';
            document.getElementById('progress-percent').innerText = '0%';

            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();

                if (data.error || !data.achievements || data.achievements.length === 0) {
                    container.innerHTML = `<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:10px;">У этой игры нет достижений.</p>`;
                    return;
                }

                container.innerHTML = '';

                const total = data.achievements.length;
                const unlocked = data.achievements.filter(ach => ach.achieved === 1).length;
                const percent = Math.round((unlocked / total) * 100);

                document.getElementById('progress-stats').innerText = `Выполнено: ${unlocked} из ${total}`;
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar-fill').style.width = `${percent}%`;

                // Если игра пройдена на 100%
                if (percent === 100) {
                    progressBlock.classList.add('perfect-game');
                    // Добавляем айфоновскую корону к названию игры
                    titleElement.innerHTML = `<img src="${EMOJI_CROWN}" alt="crown" class="apple-emoji perfect-title-emoji"> ${gameName}`;
                }

                data.achievements.forEach(ach => {
                    const item = document.createElement('div');
                    item.className = 'achievement-item';

                    const isUnlocked = ach.achieved === 1;
                    const badgeClass = isUnlocked ? 'status-unlocked' : 'status-locked';
                    // Меняем смайлики на иконки-картинки Apple
                    const badgeText = isUnlocked ? `<img src="${EMOJI_TROPHY}" alt="trophy" class="apple-emoji"> Открыто` : `<img src="${EMOJI_LOCK}" alt="lock" class="apple-emoji">`;
                    const iconClass = isUnlocked ? 'achievement-icon' : 'achievement-icon icon-locked';
                    const descText = ach.description ? ach.description : 'Секретное достижение';

                    const iconUrl = ach.icon_url ? ach.icon_url : 'https://community.cloudflare.steamstatic.com/public/images/apps/570/6ee3ec3bc938be94f489f00d8329606d860d70eb.jpg';

                    item.innerHTML = `
                        <img class="${iconClass}" src="${iconUrl}" alt="icon" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=38&h=38&auto=format&fit=crop'">
                        <div class="achievement-info">
                            <div class="achievement-name">${ach.name}</div>
                            <div class="achievement-desc">${descText}</div>
                        </div>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    `;
                    container.appendChild(item);
                });

            } catch (error) {
                console.error("Ошибка загрузки ачивок:", error);
                container.innerHTML = '<p style="color:red; text-align:center; font-size:13px; margin-top:10px;">Не удалось загрузить ачивки</p>';
            }
        }

        function showGamesView() {
            document.getElementById('achievements-view').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');
        }

        loadGames();
    </script>
</body>
</html>
