<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trophy Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-main: #f0f6fc;
            --accent-color: #58a6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.25);
            transform: scale(1.1);
            transition: background-image 0.8s ease-in-out;
            background-color: var(--bg-color);
        }

        .content-wrapper {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Главное меню */
        .dashboard-header {
            margin-bottom: 24px;
            text-align: center;
        }

        .dashboard-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .dashboard-subtitle {
            font-size: 13px;
            color: #8b949e;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin: 20px 0 10px 4px;
        }

        .platform-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .platform-card {
            background: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .platform-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .platform-icon { font-size: 32px; width: 40px; text-align: center; }
        .steam-icon { color: #66c0f4; }
        .ps-icon { color: #0070d1; }

        .platform-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .platform-status { font-size: 12px; color: #58a6ff; display: flex; align-items: center; gap: 4px; margin-top: 2px; }

        .platform-card.disabled { opacity: 0.6; pointer-events: none; }
        .coming-soon-badge { font-size: 11px; background: #21262d; color: #8b949e; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color); }

        /* Шапка окон */
        .view-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .back-btn {
            background: rgba(33, 38, 45, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
        }

        /* Статистика внутри списка игр */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: rgba(33, 38, 45, 0.3);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-value { font-size: 16px; font-weight: 800; color: #58a6ff; }
        .stat-value.perfect { color: #ffd700; }
        .stat-label { font-size: 9px; color: #8b949e; text-transform: uppercase; font-weight: 600; }

        /* Поиск и фильтры */
        .search-box { position: relative; margin-bottom: 14px; }
        .search-input { width: 100%; background: rgba(22, 27, 34, 0.6); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 14px 10px 38px; color: var(--text-main); font-size: 14px; outline: none; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8b949e; font-size: 14px; }

        .controls-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 16px; }
        .filter-tabs { display: flex; gap: 4px; }
        .tab-btn { background: rgba(33, 38, 45, 0.4); border: 1px solid rgba(48, 54, 61, 0.6); color: #8b949e; padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .tab-btn.active { background: rgba(88, 166, 255, 0.15); border-color: #58a6ff; color: #58a6ff; }
        .sort-select { flex-grow: 1; background: rgba(33, 38, 45, 0.6); border: 1px solid rgba(48, 54, 61, 0.8); color: #f0f6fc; padding: 6px 8px; border-radius: 8px; font-size: 12px; font-weight: 600; outline: none; }

        /* Список игр */
        .games-list { display: flex; flex-direction: column; gap: 8px; }
        .game-card { background: rgba(22, 27, 34, 0.35); border: 1px solid rgba(48, 54, 61, 0.4); border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 12px; }
        .game-info { display: flex; align-items: center; gap: 12px; min-width: 0; flex-grow: 1; }
        .game-icon { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; background-color: #0d1117; border: 1px solid rgba(255,255,255,0.05); }
        .game-meta { display: flex; flex-direction: column; min-width: 0; }
        .game-name { font-size: 14px; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-playtime { font-size: 11px; color: #8b949e; margin-top: 2px; }
        .fav-star { font-size: 16px; color: #8b949e; padding: 4px; }
        .fav-star.active { color: #ffb11b; }

        /* Ачивки */
        .achievement-summary-card { background: rgba(22, 27, 34, 0.4); border: 1px solid rgba(48, 54, 61, 0.6); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
        .summary-text-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .progress-bar-bg { width: 100%; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #1f6feb); width: 0%; transition: width 0.5s ease; }

        .ach-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
        .achitem-btn { background: rgba(33, 38, 45, 0.4); border: 1px solid rgba(48, 54, 61, 0.6); color: #8b949e; padding: 6px; border-radius: 8px; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; }
        .achitem-btn.active { background: rgba(88, 166, 255, 0.15); border-color: #58a6ff; color: #58a6ff; }

        .achievements-list { display: flex; flex-direction: column; gap: 8px; }
        .ach-card { background: rgba(22, 27, 34, 0.3); border: 1px solid rgba(48, 54, 61, 0.3); border-radius: 10px; padding: 8px 10px; display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden; }
        .ach-card.locked { opacity: 0.55; }
        .ach-card.locked .ach-icon { filter: grayscale(1) contrast(0.8); }
        .ach-icon { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; }
        .ach-meta { display: flex; flex-direction: column; min-width: 0; flex-grow: 1; padding-right: 44px; }
        .ach-name { font-size: 13px; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ach-desc { font-size: 11px; color: #8b949e; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .ach-rarity-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; background: rgba(33, 38, 45, 0.7); border: 1px solid var(--border-color); padding: 3px 6px; border-radius: 5px; color: #8b949e; }

        .ach-card.ultra-rare { border-color: rgba(212, 175, 55, 0.4); background: linear-gradient(95deg, rgba(22, 27, 34, 0.4) 0%, rgba(212, 175, 55, 0.04) 100%); }
        .ach-card.ultra-rare .ach-rarity-badge { color: #ffd700; border-color: rgba(212, 175, 55, 0.6); background: rgba(212, 175, 55, 0.1); }

        .skeleton { background: linear-gradient(90deg, rgba(33,38,45,0.3) 25%, rgba(48,54,61,0.5) 50%, rgba(33,38,45,0.3) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .game-card-skeleton { height: 68px; border-radius: 12px; margin-bottom: 8px; }

        .settings-box { background: rgba(22, 27, 34, 0.4); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; }
        .settings-item { display: flex; justify-content: space-between; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="dynamic-background" class="dynamic-bg"></div>

    <div id="main-dashboard">
        <div class="content-wrapper">
            <header class="dashboard-header">
                <div class="dashboard-title">Trophy Hub</div>
                <div class="dashboard-subtitle">Все твои игровые достижения в одном месте</div>
            </header>

            <div class="section-title">Игровые Платформы</div>
            <div class="platform-list">
                <div class="platform-card steam-card" onclick="showGamesView()">
                    <div class="platform-left">
                        <i class="fa-brands fa-steam platform-icon steam-icon"></i>
                        <div class="platform-meta">
                            <span class="platform-name">Steam</span>
                            <span class="platform-status"><i class="fa-solid fa-circle" style="font-size: 8px;"></i> Подключено</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="color: #8b949e; font-size: 14px;"></i>
                </div>

                <div class="platform-card disabled">
                    <div class="platform-left">
                        <i class="fa-brands fa-playstation platform-icon ps-icon"></i>
                        <div class="platform-meta">
                            <span class="platform-name">PlayStation Network</span>
                            <span class="platform-status">Не подключено</span>
                        </div>
                    </div>
                    <span class="coming-soon-badge">Скоро</span>
                </div>
            </div>

            <div class="section-title" style="margin-top:24px;">Настройки приложения</div>
            <div class="settings-box">
                <div class="settings-item">
                    <span>Текущая версия трекера</span>
                    <span style="color: #8b949e; font-weight: bold;">v2.4-fix</span>
                </div>
            </div>
        </div>
    </div>


    <div id="games-view" class="hidden">
        <div class="content-wrapper">
            <div class="view-header">
                <button class="back-btn" onclick="showDashboardView()"><i class="fa-solid fa-arrow-left"></i> Назад</button>
                <div class="view-title">🎮 Игры Steam</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value perfect" id="stat-perfect">-</span>
                    <span class="stat-label">Идеальные</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-avg">-%</span>
                    <span class="stat-label">Ср. Прогресс</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-total" style="color: #7ee787;">-</span>
                    <span class="stat-label">Всего ачивок</span>
                </div>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="game-search" class="search-input" placeholder="Поиск игры по названию..." oninput="renderGames()">
            </div>

            <div class="controls-row">
                <div class="filter-tabs">
                    <button id="tab-all" class="tab-btn active" onclick="setFilter('all')">Все</button>
                    <button id="tab-fav" class="tab-btn" onclick="setFilter('fav')">Избранное</button>
                </div>

                <select id="sort-select" class="sort-select" onchange="renderGames()">
                    <option value="name-asc">Алфавит: А-Я ↑</option>
                    <option value="name-desc">Алфавит: Я-А ↓</option>
                    <option value="playtime-desc">По времени: Многое ↓</option>
                    <option value="playtime-asc">По времени: Малое ↑</option>
                </select>
            </div>

            <div id="games-container" class="games-list"></div>
        </div>
    </div>


    <div id="achievements-view" class="hidden">
        <div class="content-wrapper">
            <div class="view-header">
                <button class="back-btn" onclick="showGamesView()"><i class="fa-solid fa-arrow-left"></i> К списку игр</button>
                <div id="ach-game-title" class="view-title">Загрузка...</div>
            </div>

            <div class="achievement-summary-card">
                <div class="summary-text-row">
                    <span id="ach-summary-text">Выполнено: 0 из 0</span>
                    <span id="ach-summary-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="ach-progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="ach-tabs">
                <button id="ach-tab-all" class="achitem-btn active" onclick="setAchFilter('all')">Все</button>
                <button id="ach-tab-unlocked" class="achitem-btn" onclick="setAchFilter('unlocked')">Открытые</button>
                <button id="ach-tab-locked" class="achitem-btn" onclick="setAchFilter('locked')">Закрытые</button>
            </div>

            <div id="achievements-container" class="achievements-list"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://steam-achievements-backend.onrender.com";

        let allGames = [];
        let currentFilter = 'all';
        let favoriteGames = JSON.parse(localStorage.getItem('fav_games')) || [];
        let currentAchievements = [];
        let currentAchFilter = 'all';
        let isGamesLoadedOnce = false;

        updateDynamicBackground('');

        function showDashboardView() {
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.add('hidden');
            updateDynamicBackground('');
        }

        function showGamesView() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');
            document.getElementById('achievements-view').classList.add('hidden');
            updateDynamicBackground('');
            if (!isGamesLoadedOnce) {
                loadGames();
            }
        }

        function showAchievementsView(gameName, headerImgUrl) {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.remove('hidden');
            document.getElementById('ach-game-title').innerText = gameName;
            if (headerImgUrl) updateDynamicBackground(headerImgUrl);
        }

        function updateDynamicBackground(imgUrl) {
            const bg = document.getElementById('dynamic-background');
            bg.style.backgroundImage = imgUrl ? `url('${imgUrl}')` : 'none';
        }

        function createGameSkeletons() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            for(let i=0; i<6; i++) {
                const skel = document.createElement('div');
                skel.className = 'skeleton game-card-skeleton';
                container.appendChild(skel);
            }
        }

        async function loadGames() {
            createGameSkeletons();
            try {
                const response = await fetch(`${BACKEND_URL}/api/games`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                allGames = data.games || [];
                isGamesLoadedOnce = true;

                // Заполнение заглушек статичными или базовыми данными, если они придут
                if (data.stats) {
                    document.getElementById('stat-perfect').innerText = data.stats.perfect_games || 0;
                    document.getElementById('stat-avg').innerText = `${data.stats.avg_completion || 0}%`;
                    document.getElementById('stat-total').innerText = data.stats.total_achievements || 0;
                } else {
                    // Если бэкенд пустой, убираем нули
                    document.getElementById('stat-perfect').innerText = '0';
                    document.getElementById('stat-avg').innerText = '0%';
                    document.getElementById('stat-total').innerText = '0';
                }

                renderGames();
            } catch (error) {
                console.error("Ошибка загрузки игр:", error);
                document.getElementById('games-container').innerHTML = '<p style="color:red; text-align:center; font-size:13px; margin-top:20px;">Не удалось загрузить библиотеку</p>';
            }
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.getElementById('tab-all').classList.toggle('active', filterType === 'all');
            document.getElementById('tab-fav').classList.toggle('active', filterType === 'fav');
            renderGames();
        }

        function toggleFavorite(event, appId) {
            event.stopPropagation();
            const index = favoriteGames.indexOf(appId);
            if (index > -1) {
                favoriteGames.splice(index, 1);
            } else {
                favoriteGames.push(appId);
            }
            localStorage.setItem('fav_games', JSON.stringify(favoriteGames));
            renderGames();
        }

        function renderGames() {
            const container = document.getElementById('games-container');
            const searchQuery = document.getElementById('game-search').value.toLowerCase().trim();
            const sortType = document.getElementById('sort-select').value;

            container.innerHTML = '';

            let filtered = allGames.filter(game => {
                const matchesSearch = game.name.toLowerCase().includes(searchQuery);
                const matchesTab = (currentFilter === 'all') || (currentFilter === 'fav' && favoriteGames.includes(game.appid));
                return matchesSearch && matchesTab;
            });

            filtered.sort((a, b) => {
                if (sortType === 'name-asc') return a.name.localeCompare(b.name);
                if (sortType === 'name-desc') return b.name.localeCompare(a.name);
                if (sortType === 'playtime-desc') return (b.playtime_forever || 0) - (a.playtime_forever || 0);
                if (sortType === 'playtime-asc') return (a.playtime_forever || 0) - (b.playtime_forever || 0);
                return 0;
            });

            if(filtered.length === 0) {
                container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:20px;">Игры не найдены</p>';
                return;
            }

            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';

                const iconUrl = game.img_icon_url
                    ? `http://media.steampowered.com/steamcommunity/public/images/apps/${game.appid}/${game.img_icon_url}.jpg`
                    : 'https://via.placeholder.com/46?text=No+Img';

                const headerImgUrl = `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;
                const hours = Math.round((game.playtime_forever || 0) / 60);
                const isFav = favoriteGames.includes(game.appid);

                card.onclick = () => loadAchievements(game.appid, game.name, headerImgUrl);

                card.innerHTML = `
                    <div class="game-info">
                        <img class="game-icon" src="${iconUrl}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/46?text=Steam'">
                        <div class="game-meta">
                            <span class="game-name">${game.name}</span>
                            <span class="game-playtime">${hours} ч. в игре</span>
                        </div>
                    </div>
                    <i class="fa-star ${isFav ? 'fa-solid active' : 'fa-regular'} fav-star" onclick="toggleFavorite(event, ${game.appid})"></i>
                `;
                container.appendChild(card);
            });
        }

        async function loadAchievements(appId, gameName, headerImgUrl) {
            showAchievementsView(gameName, headerImgUrl);
            const container = document.getElementById('achievements-container');
            container.innerHTML = '<div class="skeleton" style="height:50px; border-radius:10px;"></div>';

            document.getElementById('ach-summary-text').innerText = "Загрузка...";
            document.getElementById('ach-summary-percent').innerText = "0%";
            document.getElementById('ach-progress-fill').style.width = "0%";

            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${appId}`);
                const data = await response.json();

                if (data.error || !data.achievements) {
                    container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:16px;">У этой игры нет достижений.</p>';
                    document.getElementById('ach-summary-text').innerText = "Выполнено: 0 из 0";
                    return;
                }

                currentAchievements = data.achievements;
                const total = currentAchievements.length;
                const unlocked = currentAchievements.filter(a => a.achieved === 1).length;
                const percent = total > 0 ? Math.round((unlocked / total) * 100) : 0;

                document.getElementById('ach-summary-text').innerText = `Выполнено: ${unlocked} из ${total}`;
                document.getElementById('ach-summary-percent').innerText = `${percent}%`;
                document.getElementById('ach-progress-fill').style.width = `${percent}%`;

                setAchFilter('all');
            } catch (error) {
                container.innerHTML = '<p style="color:red; text-align:center; font-size:13px; margin-top:16px;">Не удалось загрузить ачивки</p>';
            }
        }

        function setAchFilter(type) {
            currentAchFilter = type;
            document.getElementById('ach-tab-all').classList.toggle('active', type === 'all');
            document.getElementById('ach-tab-unlocked').classList.toggle('active', type === 'unlocked');
            document.getElementById('ach-tab-locked').classList.toggle('active', type === 'locked');
            renderAchievements();
        }

        function renderAchievements() {
            const container = document.getElementById('achievements-container');
            container.innerHTML = '';

            let filtered = currentAchievements.filter(ach => {
                if (currentAchFilter === 'unlocked') return ach.achieved === 1;
                if (currentAchFilter === 'locked') return ach.achieved === 0;
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:10px;">Список пуст</p>';
                return;
            }

            filtered.forEach(ach => {
                const card = document.createElement('div');
                const isUnlocked = ach.achieved === 1;
                const globalPercent = ach.global_percent !== undefined ? ach.global_percent : 100;
                const isUltraRare = globalPercent < 10.0;

                card.className = `ach-card ${isUnlocked ? 'unlocked' : 'locked'} ${isUltraRare ? 'ultra-rare' : ''}`;
                const icon = ach.icon_url || 'https://via.placeholder.com/42?text=🏆';
                const description = ach.description || '<i>Секретное достижение</i>';

                card.innerHTML = `
                    <img class="ach-icon" src="${icon}" alt="" onerror="this.src='https://via.placeholder.com/42?text=🏆'">
                    <div class="ach-meta">
                        <span class="ach-name">${ach.name || ach.apiname}</span>
                        <span class="ach-desc">${description}</span>
                    </div>
                    <div class="ach-rarity-badge">${globalPercent}%</div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
