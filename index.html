<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Achievement Tracker</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        .game-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: scale(1.03);
            border-color: #58a6ff;
        }
        .game-cover {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #21262d;
            margin-bottom: 8px;
        }
        .game-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 40px;
        }
    </style>
</head>
<body>

    <h1>🎮 Моя библиотека Steam</h1>
    <div class="games-grid" id="games-container">
        </div>

<script>
        // Функция, которая идет на наш запущенный Python-сервер и забирает JSON
        async function loadGames() {
            try {
                // ИСПРАВЛЕНО: Меняем http на https и указываем ПРАВИЛЬНЫЙ эндпоинт для списка игр
                // Замени на имя, которое ты вписал в CHOSEN_SUBDOMAIN:
                const response = await fetch('https://egor-achievements-tracker-cool.loca.lt/api/games');
                const data = await response.json();

                // Проверяем, не вернул ли сервер ошибку
                if (data.error) {
                    throw new Error(data.error);
                }

                const container = document.getElementById('games-container');
                container.innerHTML = ''; // Очищаем текст загрузки

                // Пробегаемся циклом по каждой игре из ответа сервера
                data.games.forEach(game => {
                    // Создаем элемент карточки
                    const card = document.createElement('div');
                    card.className = 'game-card';

                    // Формируем официальную ссылку на вертикальную обложку игры в Steam
                    const coverUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.appid}/library_600x900.jpg`;

                    card.innerHTML = `
                        <img class="game-cover" src="${coverUrl}" alt="${game.name}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=240&h=320&auto=format&fit=crop'">
                        <div class="game-title">${game.name}</div>
                    `;

                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Ошибка загрузки игр:", error);
                document.getElementById('games-container').innerHTML = '<p style="color:red; grid-column: 1/-1; text-align:center;">Не удалось подключиться к Python-серверу</p>';
            }
        }

        // Запускаем загрузку при открытии страницы
        loadGames();
    </script>
</body>
</html>
