<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Achievement Tracker</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* ОБЩИЙ ЗАГОЛОВОК */
        h1 {
            text-align: center;
            color: #58a6ff;
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* ИНТЕРФЕЙС СПИСКА ИГР */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        .game-row {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .game-row:hover {
            background-color: #1f242c;
            border-color: #58a6ff;
        }
        .game-avatar {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #21262d;
            flex-shrink: 0;
        }
        .game-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-grow: 1;
        }
        .game-name {
            font-size: 15px;
            font-weight: 600;
            color: #f0f6fc;
        }
        .game-hint {
            font-size: 12px;
            color: #8b949e;
        }

        /* СТИЛИ ЭКРАНА АЧИВОК */
        .hidden {
            display: none !important;
        }
        .back-btn {
            background-color: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 15px;
            display: inline-block;
        }
        .back-btn:hover {
            background-color: #30363d;
        }
        .achievements-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ПРОГРЕСС-БАР */
        .progress-container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #f0f6fc;
        }
        .progress-bar-bg {
            background-color: #21262d;
            border-radius: 4px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
        }

        /* СПИСОК АЧИВОК */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .achievement-item {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .achievement-icon {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            background-color: #21262d;
            border: 1px solid #30363d;
            flex-shrink: 0;
        }
        .icon-locked {
            filter: grayscale(100%) opacity(50%);
        }
        .achievement-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-grow: 1;
        }
        .achievement-name {
            font-size: 14px;
            font-weight: bold;
            color: #f0f6fc;
        }
        .achievement-desc {
            font-size: 12px;
            color: #8b949e;
        }
        .status-badge {
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 8px;
            font-weight: bold;
            white-space: nowrap;
        }
        .status-unlocked {
            background-color: rgba(56, 139, 253, 0.12);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.3);
        }
        .status-locked {
            background-color: rgba(240, 246, 252, 0.03);
            color: #8b949e;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <div id="games-view">
        <h1>🎮 Библиотека Steam</h1>
        <div class="games-list" id="games-container">Загрузка списка игр...</div>
    </div>

    <div id="achievements-view" class="hidden">
        <button class="back-btn" onclick="showGamesView()">⬅ К списку игр</button>
        <h1 id="selected-game-title">Ачивки</h1>

        <div class="achievements-container">
            <div class="progress-container">
                <div class="progress-text">
                    <span id="progress-stats">Выполнено: 0 из 0</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="achievements-list" id="achievements-container">Загрузка достижений...</div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://steam-achievements-backend.onrender.com';

        async function loadGames() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/games`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                const container = document.getElementById('games-container');
                container.innerHTML = '';

                data.games.forEach(game => {
                    const row = document.createElement('div');
                    row.className = 'game-row';
                    row.onclick = () => loadAchievements(game.appid, game.name);

                    // Для маленьких иконок в списке идеально подходит стандартный header или капсула игры
                    const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;

                    row.innerHTML = `
                        <img class="game-avatar" src="${imgUrl}" alt="${game.name}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=42&h=42&auto=format&fit=crop'">
                        <div class="game-info">
                            <div class="game-name">${game.name}</div>
                            <div class="game-hint">Нажми, чтобы посмотреть ачивки</div>
                        </div>
                    `;
                    container.appendChild(row);
                });
            } catch (error) {
                console.error("Ошибка загрузки игр:", error);
                document.getElementById('games-container').innerHTML = '<p style="color:red; text-align:center;">Не удалось загрузить библиотеку</p>';
            }
        }

        async function loadAchievements(gameId, gameName) {
            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.remove('hidden');
            document.getElementById('selected-game-title').innerText = gameName;

            const container = document.getElementById('achievements-container');
            container.innerHTML = 'Загрузка достижений...';

            document.getElementById('progress-bar-fill').style.width = '0%';
            document.getElementById('progress-stats').innerText = 'Выполнено: 0 из 0';
            document.getElementById('progress-percent').innerText = '0%';

            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();

                if (data.error || !data.achievements || data.achievements.length === 0) {
                    container.innerHTML = `<p style="color:#8b949e; text-align:center;">У этой игры нет достижений.</p>`;
                    return;
                }

                container.innerHTML = '';

                const total = data.achievements.length;
                const unlocked = data.achievements.filter(ach => ach.achieved === 1).length;
                const percent = Math.round((unlocked / total) * 100);

                document.getElementById('progress-stats').innerText = `Выполнено: ${unlocked} из ${total}`;
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar-fill').style.width = `${percent}%`;

                data.achievements.forEach(ach => {
                    const item = document.createElement('div');
                    item.className = 'achievement-item';

                    const isUnlocked = ach.achieved === 1;
                    const badgeClass = isUnlocked ? 'status-unlocked' : 'status-locked';
                    const badgeText = isUnlocked ? '🏆 Открыто' : '🔒';
                    const iconClass = isUnlocked ? 'achievement-icon' : 'achievement-icon icon-locked';
                    const descText = ach.description ? ach.description : 'Секретное достижение';

                    const iconUrl = ach.icon_url ? ach.icon_url : 'https://community.cloudflare.steamstatic.com/public/images/apps/570/6ee3ec3bc938be94f489f00d8329606d860d70eb.jpg';

                    item.innerHTML = `
                        <img class="${iconClass}" src="${iconUrl}" alt="icon" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=40&h=40&auto=format&fit=crop'">
                        <div class="achievement-info">
                            <div class="achievement-name">${ach.name}</div>
                            <div class="achievement-desc">${descText}</div>
                        </div>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    `;
                    container.appendChild(item);
                });

            } catch (error) {
                console.error("Ошибка загрузки ачивок:", error);
                container.innerHTML = '<p style="color:red; text-align:center;">Не удалось загрузить ачивки</p>';
            }
        }

        function showGamesView() {
            document.getElementById('achievements-view').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');
        }

        loadGames();
    </script>
</body>
</html>
