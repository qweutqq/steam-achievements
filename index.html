<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Platform Achievement Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* БАЗОВЫЙ СКВОЗНОЙ СТИЛЬ */
        body {
            background-color: #000000;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ДИНАМИЧЕСКИЙ ГЛОБАЛЬНЫЙ ФОН */
        .global-bg {
            position: fixed;
            top: -20px;
            left: -20px;
            width: calc(100% + 40px);
            height: calc(100vh + 40px);
            z-index: 1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(25px);
            opacity: 0.35;
            transition: background-image 0.5s ease-in-out;
        }

        /* Общая обертка для контента */
        .content-wrapper {
            position: relative;
            z-index: 2;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* КНОПКИ НАВИГАЦИИ (НАЗАД) */
        .back-btn {
            background-color: rgba(33, 38, 45, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #58a6ff;
            border: 1px solid rgba(48, 54, 61, 0.6);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        /* --- 0. ГЛАВНЫЙ ЭКРАН (DASHBOARD) --- */
        .dashboard-header {
            text-align: center;
            margin: 40px 0 30px;
        }
        .dashboard-title {
            color: #f0f6fc;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .dashboard-subtitle {
            color: #8b949e;
            font-size: 13px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 25px 0 12px 5px;
        }

        .platform-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .platform-card {
            background: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.7);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
        }
        .platform-card:not(.disabled):hover {
            transform: translateY(-2px);
            background-color: rgba(33, 38, 45, 0.5);
        }
        .platform-card.steam-card:not(.disabled):hover { border-color: #1b2838; box-shadow: 0 0 15px rgba(102, 192, 244, 0.1); }

        .platform-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .platform-icon {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }
        .steam-icon { color: #66c0f4; }
        .ps-icon { color: #00439c; }

        .platform-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .platform-name {
            font-size: 16px;
            font-weight: 700;
            color: #f0f6fc;
        }
        .platform-status {
            font-size: 12px;
            color: #7ee787;
        }

        .platform-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-style: dashed;
        }
        .platform-card.disabled .platform-status { color: #8b949e; }
        .coming-soon-badge {
            background: rgba(240, 246, 252, 0.05);
            border: 1px solid rgba(48, 54, 61, 0.8);
            color: #8b949e;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        .settings-box {
            background: rgba(22, 27, 34, 0.25);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 12px;
            padding: 14px;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #c9d1d9;
        }

        /* --- I. ЭКРАН ИГР СТИМА --- */
        .main-header {
            text-align: center;
            margin: 10px 0 15px;
        }
        .main-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #58a6ff;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-filter-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            color: #8b949e;
            font-size: 14px;
        }
        .search-input {
            width: 100%;
            background-color: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 10px;
            padding: 12px 12px 12px 42px;
            color: #f0f6fc;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .search-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        /* Сортировка и вкладки в один ряд */
        /* Оптимизированный контейнер для фильтров и сортировки */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px; /* Уменьшили зазор */
            width: 100%;
            box-sizing: border-box;
        }
        .filter-tabs {
            display: flex;
            gap: 4px; /* Компактный зазор между вкладками */
            flex-shrink: 0; /* Не дает вкладкам сжиматься до нечитаемости */
        }
        .tab-btn {
            background: rgba(33, 38, 45, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(48, 54, 61, 0.6);
            color: #8b949e;
            padding: 6px 10px; /* Уменьшили внутренние отступы */
            border-radius: 8px;
            font-size: 12px; /* Чуть уменьшили шрифт */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap; /* Запрещаем перенос текста */
        }
        .tab-btn.active {
            background: rgba(88, 166, 255, 0.15);
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* Селектор сортировки, который автоматически занимает оставшееся место */
        .sort-select {
            flex-grow: 1; /* Занимает всё свободное пространство справа */
            min-width: 0; /* Позволяет flex-элементу корректно сужаться */
            background: rgba(33, 38, 45, 0.6);
            border: 1px solid rgba(48, 54, 61, 0.8);
            color: #f0f6fc;
            padding: 6px 8px; /* Уменьшили отступы */
            border-radius: 8px;
            font-size: 12px; /* Шрифт под стать кнопкам */
            font-weight: 600;
            outline: none;
            cursor: pointer;
            text-overflow: ellipsis; /* Если текст не влезет, он аккуратно сократится с "..." */
        }

        /* СПИСОК ИГР */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .game-row {
            background: transparent;
            border-bottom: 1px solid rgba(48, 54, 61, 0.4);
            padding: 12px 6px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .game-row:hover {
            background-color: rgba(88, 166, 255, 0.05);
            padding-left: 10px;
        }

        .game-row.perfect-glow {
            border-bottom-color: rgba(255, 215, 0, 0.25);
            box-shadow: 0 1px 8px rgba(255, 215, 0, 0.05);
        }
        .game-row.perfect-glow:hover { background-color: rgba(255, 215, 0, 0.03); }

        .game-avatar {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            object-fit: cover;
            background-color: rgba(33, 38, 45, 0.5);
            flex-shrink: 0;
        }
        .game-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }
        .game-name {
            font-size: 15px;
            font-weight: 600;
            color: #f0f6fc;
            padding-right: 10px;
        }
        .game-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .perfect-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }
        .fav-btn {
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 6px;
            font-size: 16px;
            transition: transform 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fav-btn:hover { transform: scale(1.15); }
        .fav-btn.is-fav { color: #f43f5e; }

        /* --- II. ЭКРАН АЧИВОК --- */
        .game-header-inside {
            text-align: center;
            margin: 10px 0 20px;
        }
        .game-title-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #f0f6fc;
            font-size: 24px;
            font-weight: 700;
        }
        .perfect-crown-icon {
            color: #ffd700;
            font-size: 22px;
        }

        .progress-container {
            background-color: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background-color: rgba(33, 38, 45, 0.7);
            border-radius: 4px;
            height: 6px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
        }
        .progress-container.perfect-game .progress-bar-fill { background: linear-gradient(90deg, #ffd700, #d4af37) !important; }
        .progress-container.perfect-game { border-color: rgba(212, 175, 55, 0.4) !important; }

        .achievements-filter-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            background: rgba(22, 27, 34, 0.3);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(48, 54, 61, 0.3);
        }
        .ach-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .ach-tab-btn.active {
            background: rgba(48, 54, 61, 0.6);
            color: #f0f6fc;
        }

        /* СПИСОК АЧИВОК */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .achievement-item {
            background-color: rgba(22, 27, 34, 0.35);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(48, 54, 61, 0.3);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .achievement-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(48, 54, 61, 0.5);
            flex-shrink: 0;
        }
        .icon-locked { filter: grayscale(100%) opacity(35%); }
        .achievement-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-grow: 1;
        }
        .achievement-name {
            font-size: 13px;
            font-weight: 700;
            color: #f0f6fc;
        }
        .achievement-desc {
            font-size: 11px;
            color: #8b949e;
        }

        /* Блок статуса и редкости */
        .achievement-status-block {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            padding: 4px 7px;
            border-radius: 6px;
            font-weight: 700;
        }
        .status-unlocked {
            background-color: rgba(56, 139, 253, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.2);
        }
        .status-locked {
            background-color: rgba(240, 246, 252, 0.02);
            color: #8b949e;
            border: 1px solid rgba(48, 54, 61, 0.4);
        }

        /* Текст редкости */
        .rarity-text {
            font-size: 10px;
            color: #8b949e;
            font-weight: 600;
        }
        /* Фишка: Неоновая фиолетовая подсветка для редких ачивок (<10% выбивших) */
        .rarity-text.ultra-rare {
            color: #d3bbff;
            text-shadow: 0 0 6px rgba(187, 134, 252, 0.4);
        }

        /* --- SKELETON LOADERS --- */
        .skeleton-row {
            padding: 12px 6px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.2);
        }
        .skeleton-avatar {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: rgba(33, 38, 45, 0.6);
        }
        .skeleton-text-main {
            height: 14px;
            width: 140px;
            background: rgba(33, 38, 45, 0.6);
            border-radius: 4px;
        }
        .skeleton-text-sub {
            height: 10px;
            width: 200px;
            background: rgba(33, 38, 45, 0.4);
            border-radius: 4px;
        }
        .skeleton-ach-item {
            background-color: rgba(22, 27, 34, 0.2);
            border: 1px solid rgba(48, 54, 61, 0.15);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .skeleton-ach-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: rgba(33, 38, 45, 0.6);
        }
        .skeleton-shimmer { position: relative; overflow: hidden; }
        .skeleton-shimmer::after {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.04) 20%, rgba(255, 255, 255, 0.08) 60%, rgba(255, 255, 255, 0) 100%);
            animation: shimmer 1.6s infinite;
            content: '';
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="global-dynamic-bg" class="global-bg"></div>

    <div id="main-dashboard">
        <div class="content-wrapper">
            <header class="dashboard-header">
                <div class="dashboard-title">Trophy Hub</div>
                <div class="dashboard-subtitle">Все твои игровые достижения в одном месте</div>
            </header>

            <div class="section-title">Игровые Платформы</div>
            <div class="platform-list">
                <div class="platform-card steam-card" onclick="showGamesView()">
                    <div class="platform-left">
                        <i class="fa-brands fa-steam platform-icon steam-icon"></i>
                        <div class="platform-meta">
                            <span class="platform-name">Steam</span>
                            <span class="platform-status"><i class="fa-solid fa-circle" style="font-size: 8px;"></i> Подключено</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="color: #8b949e; font-size: 14px;"></i>
                </div>

                <div class="platform-card disabled">
                    <div class="platform-left">
                        <i class="fa-brands fa-playstation platform-icon ps-icon"></i>
                        <div class="platform-meta">
                            <span class="platform-name">PlayStation Network</span>
                            <span class="platform-status">Не подключено</span>
                        </div>
                    </div>
                    <span class="coming-soon-badge">Скоро</span>
                </div>
            </div>

            <div class="section-title">Настройки приложения</div>
            <div class="settings-box">
                <div class="settings-item">
                    <span>Текущая версия трекера</span>
                    <span style="color: #8b949e; font-weight: bold;">v2.2-sort-rarity</span>
                </div>
            </div>
        </div>
    </div>

    <div id="games-view" class="hidden">
        <div class="content-wrapper">
            <button class="back-btn" onclick="showDashboardView()">
                <i class="fa-solid fa-arrow-left"></i> На главную
            </button>

            <header class="main-header">
                <div class="main-title"><i class="fa-brands fa-steam"></i> Steam</div>
            </header>

            <div class="search-filter-container">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Поиск игры по названию..." oninput="renderGames()">
                </div>

                <div class="controls-row">
                    <div class="filter-tabs">
                        <button id="tab-all" class="tab-btn active" onclick="setFilter('all')">Все</button>
                        <button id="tab-fav" class="tab-btn" onclick="setFilter('fav')"><i class="fa-solid fa-heart"></i> Избранное</button>
                    </div>

                    <select id="sort-select" class="sort-select" onchange="renderGames()">
                        <option value="name_asc">Алфавит: А-Я ↑</option>
                        <option value="name_desc">Алфавит: Я-А ↓</option>
                        <option value="prog_desc">Выполнение: 100%-0% ↓</option>
                        <option value="prog_asc">Выполнение: 0%-100% ↑</option>
                    </select>
                </div>
            </div>

            <div class="games-list" id="games-container"></div>
        </div>
    </div>

    <div id="achievements-view" class="hidden">
        <div class="content-wrapper">
            <button class="back-btn" onclick="showGamesViewFromAchievements()">
                <i class="fa-solid fa-arrow-left"></i> К списку игр
            </button>

            <header class="game-header-inside">
                <div id="selected-game-title" class="game-title-text">Ачивки</div>
            </header>

            <div id="progress-block" class="progress-container">
                <div class="progress-text">
                    <span id="progress-stats">Выполнено: 0 из 0</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="achievements-filter-tabs">
                <button id="ach-tab-all" class="ach-tab-btn active" onclick="setAchievementFilter('all')">Все</button>
                <button id="ach-tab-unlocked" class="ach-tab-btn" onclick="setAchievementFilter('unlocked')">Открытые</button>
                <button id="ach-tab-locked" class="ach-tab-btn" onclick="setAchievementFilter('locked')">Закрытые</button>
            </div>

            <div class="achievements-list" id="achievements-container"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://steam-achievements-backend.onrender.com';
        const DEFAULT_BG = "https://images.unsplash.com/photo-1612287230202-1bf1d85d1bdf?q=80&w=1000&auto=format&fit=crop";

        let allGames = [];
        let currentFilter = 'all';
        let currentAchFilter = 'all';
        let loadedAchievements = [];
        const perfectGamesCache = {};
        // Кэш для хранения вычисленных процентов прохождения каждой игры, чтобы быстро сортировать
        const gameProgressCache = {};

        let savedScrollPosition = 0;
        let isGamesLoadedOnce = false;

        document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${DEFAULT_BG}')`;

        function createGameSkeletons() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                container.innerHTML += `
                    <div class="skeleton-row skeleton-shimmer">
                        <div class="skeleton-avatar"></div>
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            <div class="skeleton-text-main"></div>
                            <div class="skeleton-text-sub"></div>
                        </div>
                    </div>
                `;
            }
        }

        function createAchievementSkeletons() {
            const container = document.getElementById('achievements-container');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                container.innerHTML += `
                    <div class="skeleton-ach-item skeleton-shimmer">
                        <div class="skeleton-ach-icon"></div>
                        <div style="display:flex; flex-direction:column; gap:6px; flex-grow:1;">
                            <div class="skeleton-text-main" style="width: 110px;"></div>
                            <div class="skeleton-text-sub" style="width: 70%;"></div>
                        </div>
                    </div>
                `;
            }
        }

        async function loadGames() {
            createGameSkeletons();
            try {
                const response = await fetch(`${BACKEND_URL}/api/games`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                allGames = data.games || [];
                isGamesLoadedOnce = true;
                renderGames();
            } catch (error) {
                console.error("Ошибка загрузки игр:", error);
                document.getElementById('games-container').innerHTML = '<p style="color:red; text-align:center; font-size:13px; margin-top:20px;">Не удалось загрузить библиотеку</p>';
            }
        }

        function renderGames() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const favorites = JSON.parse(localStorage.getItem('steam_favorites') || '[]');

            // 1. Фильтрация
            let filteredGames = allGames.filter(game => {
                const matchesSearch = game.name.toLowerCase().includes(searchQuery);
                const matchesFilter = currentFilter === 'all' || favorites.includes(game.appid);
                return matchesSearch && matchesFilter;
            });

            // 2. Умная сортировка на основе выбранного правила
            const sortRule = document.getElementById('sort-select').value;
            filteredGames.sort((a, b) => {
                if (sortRule === 'name_asc') return a.name.localeCompare(b.name);
                if (sortRule === 'name_desc') return b.name.localeCompare(a.name);

                // Сортировка по проценту прохождения
                if (sortRule === 'prog_desc' || sortRule === 'prog_asc') {
                    const progA = gameProgressCache[a.appid] || 0;
                    const progB = gameProgressCache[b.appid] || 0;
                    return sortRule === 'prog_desc' ? progB - progA : progA - progB;
                }
                return 0;
            });

            if (filteredGames.length === 0) {
                container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:20px;">Игры не найдены</p>';
                return;
            }

            filteredGames.forEach(game => {
                const row = document.createElement('div');
                const isPerfect = perfectGamesCache[game.appid] === true;
                row.className = `game-row ${isPerfect ? 'perfect-glow' : ''}`;
                row.id = `game-row-${game.appid}`;
                row.onclick = () => loadAchievements(game.appid, game.name);

                const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;
                const isFav = favorites.includes(game.appid);

                row.innerHTML = `
                    <img class="game-avatar" src="${imgUrl}" alt="${game.name}" onerror="this.src='${DEFAULT_BG}'">
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-meta">
                            <div class="perfect-badge ${isPerfect ? '' : 'hidden'}" id="badge-${game.appid}">
                                <i class="fa-solid fa-trophy"></i> 100%
                            </div>
                            <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite(event, ${game.appid})">
                                <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(row);

                if (perfectGamesCache[game.appid] === undefined) {
                    checkGamePerfectStatus(game.appid);
                }
            });
        }

        function toggleFavorite(event, gameId) {
            event.stopPropagation();
            let favorites = JSON.parse(localStorage.getItem('steam_favorites') || '[]');

            if (favorites.includes(gameId)) {
                favorites = favorites.filter(id => id !== gameId);
            } else {
                favorites.push(gameId);
            }

            localStorage.setItem('steam_favorites', JSON.stringify(favorites));
            renderGames();
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.getElementById('tab-all').classList.toggle('active', filterType === 'all');
            document.getElementById('tab-fav').classList.toggle('active', filterType === 'fav');
            renderGames();
        }

        async function checkGamePerfectStatus(gameId) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();
                if (data.achievements && data.achievements.length > 0) {
                    const total = data.achievements.length;
                    const unlocked = data.achievements.filter(ach => ach.achieved === 1).length;
                    const percent = Math.round((unlocked / total) * 100);

                    // Сохраняем в кэш для сортировки
                    gameProgressCache[gameId] = percent;

                    if (total === unlocked && total > 0) {
                        perfectGamesCache[gameId] = true;
                        const badge = document.getElementById(`badge-${gameId}`);
                        if (badge) badge.classList.remove('hidden');
                        const row = document.getElementById(`game-row-${gameId}`);
                        if (row) row.classList.add('perfect-glow');
                    } else {
                        perfectGamesCache[gameId] = false;
                    }
                } else {
                    perfectGamesCache[gameId] = false;
                    gameProgressCache[gameId] = 0;
                }
            } catch(e) {
                perfectGamesCache[gameId] = false;
                gameProgressCache[gameId] = 0;
            }
        }

        async function loadAchievements(gameId, gameName) {
            savedScrollPosition = window.scrollY;

            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.remove('hidden');

            window.scrollTo(0, 0);
            setAchievementFilter('all');

            const titleElement = document.getElementById('selected-game-title');
            titleElement.innerText = gameName;

            const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${gameId}/header.jpg`;
            document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${imgUrl}')`;

            createAchievementSkeletons();

            const progressBlock = document.getElementById('progress-block');
            progressBlock.classList.remove('perfect-game');
            document.getElementById('progress-bar-fill').style.width = '0%';

            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();

                if (data.error || !data.achievements || data.achievements.length === 0) {
                    document.getElementById('achievements-container').innerHTML = `<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:10px;">У этой игры нет достижений.</p>`;
                    return;
                }

                loadedAchievements = data.achievements.sort((a, b) => a.achieved - b.achieved);

                const total = loadedAchievements.length;
                const unlocked = loadedAchievements.filter(ach => ach.achieved === 1).length;
                const percent = Math.round((unlocked / total) * 100);

                document.getElementById('progress-stats').innerText = `Выполнено: ${unlocked} из ${total}`;
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar-fill').style.width = `${percent}%`;

                if (percent === 100) {
                    progressBlock.classList.add('perfect-game');
                    titleElement.innerHTML = `<i class="fa-solid fa-crown perfect-crown-icon"></i> ${gameName}`;
                }

                renderAchievements();

            } catch (error) {
                console.error(error);
                document.getElementById('achievements-container').innerHTML = '<p style="color:red; text-align:center; font-size:13px;">Не удалось загрузить ачивки</p>';
            }
        }

        function renderAchievements() {
            const container = document.getElementById('achievements-container');
            container.innerHTML = '';

            const filtered = loadedAchievements.filter(ach => {
                if (currentAchFilter === 'unlocked') return ach.achieved === 1;
                if (currentAchFilter === 'locked') return ach.achieved === 0;
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:15px;">В этой категории пусто</p>';
                return;
            }

            filtered.forEach(ach => {
                const item = document.createElement('div');
                item.className = 'achievement-item';

                const isUnlocked = ach.achieved === 1;
                const badgeClass = isUnlocked ? 'status-unlocked' : 'status-locked';
                const badgeText = isUnlocked ? `<i class="fa-solid fa-trophy"></i> Открыто` : `<i class="fa-solid fa-lock"></i>`;
                const iconClass = isUnlocked ? 'achievement-icon' : 'achievement-icon icon-locked';
                const descText = ach.description ? ach.description : 'Секретное достижение';
                const iconUrl = ach.icon_url ? ach.icon_url : 'https://community.cloudflare.steamstatic.com/public/images/apps/570/6ee3ec3bc938be94f489f00d8329606d860d70eb.jpg';

                // Вычисляем редкость
                const globPercent = ach.global_percent !== undefined ? ach.global_percent : 100;
                const isUltraRare = globPercent < 10.0;

                item.innerHTML = `
                    <img class="${iconClass}" src="${iconUrl}" alt="icon" onerror="this.src='${DEFAULT_BG}'">
                    <div class="achievement-info">
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-desc">${descText}</div>
                    </div>
                    <div class="achievement-status-block">
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                        <span class="rarity-text ${isUltraRare ? 'ultra-rare' : ''}">${globPercent}% игроков</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function setAchievementFilter(type) {
            currentAchFilter = type;
            document.getElementById('ach-tab-all').classList.toggle('active', type === 'all');
            document.getElementById('ach-tab-unlocked').classList.toggle('active', type === 'unlocked');
            document.getElementById('ach-tab-locked').classList.toggle('active', type === 'locked');

            if (loadedAchievements.length > 0) {
                renderAchievements();
            }
        }

        function showGamesView() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');

            if (!isGamesLoadedOnce) {
                loadGames();
            } else {
                renderGames();
                window.scrollTo(0, savedScrollPosition);
            }
        }

        function showGamesViewFromAchievements() {
            document.getElementById('achievements-view').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');
            document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${DEFAULT_BG}')`;

            renderGames();
            window.scrollTo(0, savedScrollPosition);
        }

        function showDashboardView() {
            savedScrollPosition = window.scrollY;
            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${DEFAULT_BG}')`;
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
