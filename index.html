<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Achievement Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* БАЗОВЫЙ СКВОЗНОЙ СТИЛЬ */
        body {
            background-color: #000000;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ДИНАМИЧЕСКИЙ ГЛОБАЛЬНЫЙ ФОН */
        .global-bg {
            position: fixed;
            top: -20px;
            left: -20px;
            width: calc(100% + 40px);
            height: calc(100vh + 40px);
            z-index: 1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(25px);
            opacity: 0.45;
            transition: background-image 0.5s ease-in-out;
        }

        /* Общая обертка для контента */
        .content-wrapper {
            position: relative;
            z-index: 2;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        .main-header {
            text-align: center;
            margin: 25px 0 15px;
        }
        .main-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #58a6ff;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* УМНЫЙ ПОИСК И ФИЛЬТРЫ */
        .search-filter-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            color: #8b949e;
            font-size: 14px;
        }
        .search-input {
            width: 100%;
            background-color: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 10px;
            padding: 12px 12px 12px 42px;
            color: #f0f6fc;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .search-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        .filter-tabs {
            display: flex;
            gap: 8px;
        }
        .tab-btn {
            background: rgba(33, 38, 45, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(48, 54, 61, 0.6);
            color: #8b949e;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn.active {
            background: rgba(88, 166, 255, 0.15);
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* СПИСОК ИГР */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .game-row {
            background: transparent;
            border-bottom: 1px solid rgba(48, 54, 61, 0.4);
            padding: 12px 6px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background-color 0.2s, padding-left 0.2s;
        }
        .game-row:hover {
            background-color: rgba(88, 166, 255, 0.05);
            padding-left: 10px;
        }
        .game-avatar {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            object-fit: cover;
            background-color: rgba(33, 38, 45, 0.5);
            flex-shrink: 0;
        }
        .game-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }
        .game-name {
            font-size: 15px;
            font-weight: 600;
            color: #f0f6fc;
            padding-right: 10px;
        }
        .game-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .perfect-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }
        .fav-btn {
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 6px;
            font-size: 16px;
            transition: transform 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fav-btn:hover {
            transform: scale(1.15);
        }
        .fav-btn.is-fav {
            color: #f43f5e;
        }

        /* --- ЭКРАН АЧИВОК --- */
        .back-btn {
            background-color: rgba(33, 38, 45, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #58a6ff;
            border: 1px solid rgba(48, 54, 61, 0.6);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .game-header-inside {
            text-align: center;
            margin: 10px 0 25px;
        }
        .game-title-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #f0f6fc;
            font-size: 24px;
            font-weight: 700;
        }
        .perfect-crown-icon {
            color: #ffd700;
            font-size: 22px;
        }

        /* ПРОГРЕСС-БАР */
        .progress-container {
            background-color: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 18px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background-color: rgba(33, 38, 45, 0.7);
            border-radius: 4px;
            height: 6px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
        }
        .progress-container.perfect-game .progress-bar-fill {
            background: linear-gradient(90deg, #ffd700, #d4af37) !important;
        }
        .progress-container.perfect-game {
            border-color: rgba(212, 175, 55, 0.4) !important;
        }

        /* СПИСОК АЧИВОК */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .achievement-item {
            background-color: rgba(22, 27, 34, 0.35);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(48, 54, 61, 0.3);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .achievement-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(48, 54, 61, 0.5);
            flex-shrink: 0;
        }
        .icon-locked {
            filter: grayscale(100%) opacity(35%);
        }
        .achievement-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-grow: 1;
        }
        .achievement-name {
            font-size: 13px;
            font-weight: 700;
            color: #f0f6fc;
        }
        .achievement-desc {
            font-size: 11px;
            color: #8b949e;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            padding: 4px 7px;
            border-radius: 6px;
            font-weight: 700;
        }
        .status-unlocked {
            background-color: rgba(56, 139, 253, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.2);
        }
        .status-locked {
            background-color: rgba(240, 246, 252, 0.02);
            color: #8b949e;
            border: 1px solid rgba(48, 54, 61, 0.4);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="global-dynamic-bg" class="global-bg"></div>

    <div id="games-view">
        <div class="content-wrapper">
            <header class="main-header">
                <div class="main-title">
                    <i class="fa-brands fa-steam"></i> Steam
                </div>
            </header>

            <div class="search-filter-container">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Поиск игры по названию..." oninput="renderGames()">
                </div>
                <div class="filter-tabs">
                    <button id="tab-all" class="tab-btn active" onclick="setFilter('all')">Все игры</button>
                    <button id="tab-fav" class="tab-btn" onclick="setFilter('fav')"><i class="fa-solid fa-heart"></i> Отслеживаемые</button>
                </div>
            </div>

            <div class="games-list" id="games-container">Загрузка списка игр...</div>
        </div>
    </div>

    <div id="achievements-view" class="hidden">
        <div class="content-wrapper">
            <button class="back-btn" onclick="showGamesView()">
                <i class="fa-solid fa-arrow-left"></i> К списку игр
            </button>

            <header class="game-header-inside">
                <div id="selected-game-title" class="game-title-text">Ачивки</div>
            </header>

            <div id="progress-block" class="progress-container">
                <div class="progress-text">
                    <span id="progress-stats">Выполнено: 0 из 0</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="achievements-list" id="achievements-container">Загрузка achievements...</div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://steam-achievements-backend.onrender.com';
        const DEFAULT_BG = "https://images.unsplash.com/photo-1612287230202-1bf1d85d1bdf?q=80&w=1000&auto=format&fit=crop";

        let allGames = [];
        let currentFilter = 'all';
        const perfectGamesCache = {};

        // Переменная для хранения позиции скролла
        let savedScrollPosition = 0;

        document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${DEFAULT_BG}')`;

        async function loadGames() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/games`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                allGames = data.games || [];
                renderGames();
            } catch (error) {
                console.error("Ошибка загрузки игр:", error);
                document.getElementById('games-container').innerHTML = '<p style="color:red; text-align:center; font-size:13px; margin-top:20px;">Не удалось загрузить библиотеку</p>';
            }
        }

        function renderGames() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const favorites = JSON.parse(localStorage.getItem('steam_favorites') || '[]');

            const filteredGames = allGames.filter(game => {
                const matchesSearch = game.name.toLowerCase().includes(searchQuery);
                const matchesFilter = currentFilter === 'all' || favorites.includes(game.appid);
                return matchesSearch && matchesFilter;
            });

            if (filteredGames.length === 0) {
                container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:20px;">Игры не найдены</p>';
                return;
            }

            filteredGames.forEach(game => {
                const row = document.createElement('div');
                row.className = 'game-row';
                row.onclick = () => loadAchievements(game.appid, game.name);

                const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;
                const isFav = favorites.includes(game.appid);

                row.innerHTML = `
                    <img class="game-avatar" src="${imgUrl}" alt="${game.name}" onerror="this.src='${DEFAULT_BG}'">
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-meta">
                            <div class="perfect-badge ${perfectGamesCache[game.appid] ? '' : 'hidden'}" id="badge-${game.appid}">
                                <i class="fa-solid fa-trophy"></i> 100%
                            </div>
                            <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite(event, ${game.appid})">
                                <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(row);

                if (perfectGamesCache[game.appid] === undefined) {
                    checkGamePerfectStatus(game.appid);
                }
            });
        }

        function toggleFavorite(event, gameId) {
            event.stopPropagation();
            let favorites = JSON.parse(localStorage.getItem('steam_favorites') || '[]');

            if (favorites.includes(gameId)) {
                favorites = favorites.filter(id => id !== gameId);
            } else {
                favorites.push(gameId);
            }

            localStorage.setItem('steam_favorites', JSON.stringify(favorites));
            renderGames();
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.getElementById('tab-all').classList.toggle('active', filterType === 'all');
            document.getElementById('tab-fav').classList.toggle('active', filterType === 'fav');
            renderGames();
        }

        async function checkGamePerfectStatus(gameId) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();
                if (data.achievements && data.achievements.length > 0) {
                    const total = data.achievements.length;
                    const unlocked = data.achievements.filter(ach => ach.achieved === 1).length;

                    if (total === unlocked && total > 0) {
                        perfectGamesCache[gameId] = true;
                        const badge = document.getElementById(`badge-${gameId}`);
                        if (badge) badge.classList.remove('hidden');
                    } else {
                        perfectGamesCache[gameId] = false;
                    }
                } else {
                    perfectGamesCache[gameId] = false;
                }
            } catch(e) {
                perfectGamesCache[gameId] = false;
            }
        }

        async function loadAchievements(gameId, gameName) {
            // ФИШКА ТУТ: Сохраняем текущую позицию скролла перед скрытием меню
            savedScrollPosition = window.scrollY;

            document.getElementById('games-view').classList.add('hidden');
            document.getElementById('achievements-view').classList.remove('hidden');

            // Автоматически откручиваем экран ачивок наверх, чтобы не смотреть в пустоту
            window.scrollTo(0, 0);

            const titleElement = document.getElementById('selected-game-title');
            titleElement.innerText = gameName;

            const imgUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${gameId}/header.jpg`;
            document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${imgUrl}')`;

            const container = document.getElementById('achievements-container');
            container.innerHTML = '<p style="color:#8b949e; text-align:center; font-size:13px;">Загрузка достижений...</p>';

            const progressBlock = document.getElementById('progress-block');
            progressBlock.classList.remove('perfect-game');
            document.getElementById('progress-bar-fill').style.width = '0%';

            try {
                const response = await fetch(`${BACKEND_URL}/api/achievements?game_id=${gameId}`);
                const data = await response.json();

                if (data.error || !data.achievements || data.achievements.length === 0) {
                    container.innerHTML = `<p style="color:#8b949e; text-align:center; font-size:13px; margin-top:10px;">У этой игры нет достижений.</p>`;
                    return;
                }

                container.innerHTML = '';

                const sortedAchievements = data.achievements.sort((a, b) => a.achieved - b.achieved);
                const total = sortedAchievements.length;
                const unlocked = sortedAchievements.filter(ach => ach.achieved === 1).length;
                const percent = Math.round((unlocked / total) * 100);

                document.getElementById('progress-stats').innerText = `Выполнено: ${unlocked} из ${total}`;
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar-fill').style.width = `${percent}%`;

                if (percent === 100) {
                    progressBlock.classList.add('perfect-game');
                    titleElement.innerHTML = `<i class="fa-solid fa-crown perfect-crown-icon"></i> ${gameName}`;
                }

                sortedAchievements.forEach(ach => {
                    const item = document.createElement('div');
                    item.className = 'achievement-item';

                    const isUnlocked = ach.achieved === 1;
                    const badgeClass = isUnlocked ? 'status-unlocked' : 'status-locked';
                    const badgeText = isUnlocked ? `<i class="fa-solid fa-trophy"></i> Открыто` : `<i class="fa-solid fa-lock"></i>`;
                    const iconClass = isUnlocked ? 'achievement-icon' : 'achievement-icon icon-locked';
                    const descText = ach.description ? ach.description : 'Секретное достижение';
                    const iconUrl = ach.icon_url ? ach.icon_url : 'https://community.cloudflare.steamstatic.com/public/images/apps/570/6ee3ec3bc938be94f489f00d8329606d860d70eb.jpg';

                    item.innerHTML = `
                        <img class="${iconClass}" src="${iconUrl}" alt="icon" onerror="this.src='${DEFAULT_BG}'">
                        <div class="achievement-info">
                            <div class="achievement-name">${ach.name}</div>
                            <div class="achievement-desc">${descText}</div>
                        </div>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    `;
                    container.appendChild(item);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<p style="color:red; text-align:center; font-size:13px;">Не удалось загрузить ачивки</p>';
            }
        }

        function showGamesView() {
            document.getElementById('achievements-view').classList.add('hidden');
            document.getElementById('games-view').classList.remove('hidden');
            document.getElementById('global-dynamic-bg').style.backgroundImage = `url('${DEFAULT_BG}')`;

            renderGames();

            // ФИШКА ТУТ: Возвращаем пользователя ровно на ту высоту, где он кликнул по игре
            window.scrollTo(0, savedScrollPosition);
        }

        loadGames();
    </script>
</body>
</html>
